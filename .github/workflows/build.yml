name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bd452/kindle-kpm-build:v0.1.0@sha256:c7bd7e4041717bb16765b97d6fe4f578f40d144fa3628fcad81271e22f18a69b
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Check shared devkit version
        run: |
          test "$(cat .kpm-devkit-version)" = "0.1.0"
          test "$(kpm-dev --version)" = "kpm-dev 0.1.0"
      - name: Host tests
        run: cargo test --manifest-path rust/Cargo.toml --workspace
      - name: Build packages
        run: ./build.sh
      - name: Stage package artifacts
        run: |
          mkdir -p dist
          cp apps/com.bd452.ksubstrate/dist/*.kpkg dist/
          cp apps/com.bd452.ksubstratedemo/dist/*.kpkg dist/
      - name: Generate release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ./scripts/generate-release-metadata.sh \
            --base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            --tag "$GITHUB_REF_NAME" \
            --output dist/release-metadata.json
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
